spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: service-github
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kanta_github}
    username: ${DB_USERNAME:kanta}
    password: ${DB_PASSWORD:kanta}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:service-github}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8086}

kanta:
  kafka:
    topics:
      commit-matched: ${KAFKA_TOPIC_COMMIT_MATCHED:commit.matched}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    poll-size: ${OUTBOX_POLL_SIZE:50}
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:5000}
  github:
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:change-me-github-webhook-secret}
  kanban:
    base-url: ${KANBAN_SERVICE_URL:http://service-kanban:8081}
  workspace:
    base-url: ${WORKSPACE_SERVICE_URL:http://service-workspace:8084}
