spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: service-gateway
  cloud:
    gateway:
      routes:
        - id: auth-oauth
          uri: ${AUTH_SERVICE_URL:http://service-auth:8083}
          predicates:
            - Path=/api/auth/oauth/**
          filters:
            - StripPrefix=1
        - id: auth-token
          uri: ${AUTH_SERVICE_URL:http://service-auth:8083}
          predicates:
            - Path=/api/auth/token/**,/api/auth/logout
          filters:
            - StripPrefix=1
        - id: user-service
          uri: ${USER_SERVICE_URL:http://service-user:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - PassportExchange
        - id: kanban-boards
          uri: ${KANBAN_SERVICE_URL:http://service-kanban:8081}
          predicates:
            - Path=/api/boards/**
          filters:
            - StripPrefix=1
            - PassportExchange
        - id: kanban-cards
          uri: ${KANBAN_SERVICE_URL:http://service-kanban:8081}
          predicates:
            - Path=/api/cards/**
          filters:
            - StripPrefix=1
            - PassportExchange
        - id: workspace-service
          uri: ${WORKSPACE_SERVICE_URL:http://service-workspace:8084}
          predicates:
            - Path=/api/workspaces/**
          filters:
            - StripPrefix=1
            - PassportExchange
        - id: meeting-service
          uri: ${MEETING_SERVICE_URL:http://service-meeting:8085}
          predicates:
            - Path=/api/meeting-notes/**
          filters:
            - StripPrefix=1
            - PassportExchange
            - WorkspaceRateLimit=meeting-notes
        - id: github-webhooks
          uri: ${GITHUB_SERVICE_URL:http://service-github:8086}
          predicates:
            - Path=/api/github/webhooks
          filters:
            - StripPrefix=1
            - WorkspaceRateLimit=github-webhook
        - id: github-commit-links
          uri: ${GITHUB_SERVICE_URL:http://service-github:8086}
          predicates:
            - Path=/api/github/commit-links/**
          filters:
            - StripPrefix=1
            - PassportExchange
        - id: websocket-hub
          uri: ${WEBSOCKET_HUB_SERVICE_URL:http://service-websocket-hub:8087}
          predicates:
            - Path=/api/ws/**
          filters:
            - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

kanta:
  gateway:
    auth-service-url: ${AUTH_SERVICE_URL:http://service-auth:8083}
    kanban-service-url: ${KANBAN_SERVICE_URL:http://service-kanban:8081}
    workspace-service-url: ${WORKSPACE_SERVICE_URL:http://service-workspace:8084}
    internal-secret: ${INTERNAL_GATEWAY_SECRET:change-me-internal-gateway-secret}
  rate-limit:
    github-webhook:
      per-minute: ${GITHUB_WEBHOOK_RATE_LIMIT_PER_MINUTE:60}
    meeting-notes:
      per-minute: ${MEETING_NOTES_RATE_LIMIT_PER_MINUTE:10}
      per-day: ${MEETING_NOTES_RATE_LIMIT_PER_DAY:100}
