services:
  postgres:
    image: postgres:16-alpine
    container_name: kanta-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanta_kanban}
      POSTGRES_USER: ${POSTGRES_USER:-kanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      TZ: Asia/Seoul
    volumes:
      - kanta-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: kanta-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  service-kanban:
    build:
      context: .
      args:
        MODULE: service-kanban
    container_name: kanta-service-kanban
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanta_kanban
      DB_USERNAME: ${POSTGRES_USER:-kanta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP_ID: service-kanban
      SERVER_PORT: 8081

  service-user:
    build:
      context: .
      args:
        MODULE: service-user
    container_name: kanta-service-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8082:8082"
      - "9090:9090"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanta_user
      DB_USERNAME: ${POSTGRES_USER:-kanta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8082
      GRPC_SERVER_PORT: 9090
      AUTH_SERVICE_GRPC_HOST: service-auth
      AUTH_SERVICE_GRPC_PORT: 9091

  service-auth:
    build:
      context: .
      args:
        MODULE: service-auth
    container_name: kanta-service-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
      - "9091:9091"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanta_auth
      DB_USERNAME: ${POSTGRES_USER:-kanta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP_ID: service-auth
      SERVER_PORT: 8083
      GRPC_SERVER_PORT: 9091
      USER_SERVICE_GRPC_HOST: service-user
      USER_SERVICE_GRPC_PORT: 9090
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-bytes-minimum-secret-key}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-change-me-internal-gateway-secret}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8080/api/auth/oauth/github/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/oauth/google/callback}

  service-workspace:
    build:
      context: .
      args:
        MODULE: service-workspace
    container_name: kanta-service-workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanta_workspace
      DB_USERNAME: ${POSTGRES_USER:-kanta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP_ID: service-workspace
      SERVER_PORT: 8084

  service-meeting:
    build:
      context: .
      args:
        MODULE: service-meeting
    container_name: kanta-service-meeting
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      service-kanban:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanta_meeting
      DB_USERNAME: ${POSTGRES_USER:-kanta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kanta}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP_ID: service-meeting
      SERVER_PORT: 8085
      KANBAN_SERVICE_URL: http://service-kanban:8081

  service-gateway:
    build:
      context: .
      args:
        MODULE: service-gateway
    container_name: kanta-service-gateway
    restart: unless-stopped
    depends_on:
      - service-kanban
      - service-user
      - service-auth
      - service-workspace
      - service-meeting
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://service-auth:8083
      USER_SERVICE_URL: http://service-user:8082
      KANBAN_SERVICE_URL: http://service-kanban:8081
      WORKSPACE_SERVICE_URL: http://service-workspace:8084
      MEETING_SERVICE_URL: http://service-meeting:8085
      INTERNAL_GATEWAY_SECRET: ${INTERNAL_GATEWAY_SECRET:-change-me-internal-gateway-secret}

volumes:
  kanta-postgres-data:
