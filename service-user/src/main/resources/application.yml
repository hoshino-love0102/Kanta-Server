spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: service-user
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kanta_user}
    username: ${DB_USERNAME:kanta}
    password: ${DB_PASSWORD:kanta}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8082}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}
  client:
    service-auth:
      address: static://${AUTH_SERVICE_GRPC_HOST:localhost}:${AUTH_SERVICE_GRPC_PORT:9091}
      negotiationType: PLAINTEXT

kanta:
  kafka:
    topics:
      user-events: ${KAFKA_TOPIC_USER_EVENTS:user.events}
  outbox:
    publisher-enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    poll-size: ${OUTBOX_POLL_SIZE:50}
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:5000}
