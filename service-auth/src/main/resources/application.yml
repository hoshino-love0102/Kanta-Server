spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: service-auth
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kanta_auth}
    username: ${DB_USERNAME:kanta}
    password: ${DB_PASSWORD:kanta}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:service-auth}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8083}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
  client:
    service-user:
      address: static://${USER_SERVICE_GRPC_HOST:localhost}:${USER_SERVICE_GRPC_PORT:9090}
      negotiationType: PLAINTEXT

kanta:
  kafka:
    topics:
      user-events: ${KAFKA_TOPIC_USER_EVENTS:user.events}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-32-bytes-minimum-secret-key}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
  refresh-token:
    ttl-days: ${REFRESH_TOKEN_TTL_DAYS:30}
  internal:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET:change-me-internal-gateway-secret}
  oauth:
    frontend-redirect-uri: ${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:5173/}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
